<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
    <style>
      fieldset {
        border: 0;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Contact and Pay Info</h1>
      <form>
        <label for="name">Name:</label> <br />
        <input type="text" name="name" id="name" /><br /><br />
        <label for="adress">Address</label>
        <br />
        <input type="text" name="address" id="adress" />
        <br /><br />
        <label for="city">City:</label>
        <br />
        <input type="text" name="city" id="city" />
        <br /><br />
        <label for="zipcode">Zip Code:</label>
        <br />
        <input type="text" name="zip" id="zipcode" />
        <br /><br />

        <fieldset>
          <legend>Credit Card Type:</legend>

          <input type="radio" name="card" value="visa" id="visa" />
          <label for="visa">Visa </label><br />
          <input type="radio" name="card" value="mastercard" id="mastercard" />
          <label for="mastercard">MasterCard</label><br />
          <input type="radio" name="card" value="amex" id="amex" />
          <label for="amex">American Express</label><br />
        </fieldset>
        <br />

        <label for="cc_number">Credit Card Number:</label>
        <br />
        <input type="text" name="cc_number" id="cc_number" /><br /><br />
        <label for="cvc">CVC:</label> <br />
        <input type="text" name="cvv" id="cvc" /><br /><br />
        <input type="submit" value="Submit" />
      </form>
    </main>
  </body>
</html>
